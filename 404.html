<!-- Gemini code -->
<script type="text/javascript">
    // This has to be changed between the "prod" - genixpl.github.io,
    // and "beta" - genixpl.github.io/portfolio6.
    // On macOS the command is:
    // ``` bash
    // sed -i '' '14c\
    //     var pathSegmentsToKeep = 0;' web/404.html
    // ```
    // and on Linux:
    // ``` bash
    // sed -i '14s/.*/    var pathSegmentsToKeep = 0;/' wweb/404.html
    // ```
    var pathSegmentsToKeep = 0;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
</script>
